{% extends 'layout.html' %}
{% block title %}Editar parámetro — Emysic{% endblock %}
{% block topbar_title %}Editar Parámetro{% endblock %}

{% block content %}
<div class="d-flex align-items-center gap-3 mb-4">
    <a href="{{ url_for('config') }}" class="icon-btn" title="Volver"
       style="width:36px;height:36px;">
        <i class="bi bi-arrow-left"></i>
    </a>
    <div>
        <h1 class="page-heading">Editar Parámetro</h1>
    </div>
</div>

<div class="em-card" style="max-width:500px;">
    <div class="mb-3">
        <label class="form-label">Clave</label>
        <input type="text" class="form-control"
               value="{{ param[1] }}" readonly>
    </div>
    <form method="POST">
        <div class="mb-3">
            <label class="form-label">Valor *</label>
            <input type="text" name="valor" class="form-control"
                   value="{{ param[2] }}" required>
        </div>
        <div class="mb-4">
            <label class="form-label">Descripción</label>
            <input type="text" name="descripcion" class="form-control"
                   value="{{ param[3] or '' }}">
        </div>
        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-danger"
                    style="border-radius:8px;padding:.55rem 1.4rem;">
                <i class="bi bi-check-lg me-1"></i> Guardar
            </button>
            <a href="{{ url_for('config') }}" class="btn btn-sm"
               style="background:var(--em-surface);border:1px solid var(--em-border);
                      color:var(--em-text);border-radius:8px;padding:.55rem 1.2rem;">
                Cancelar
            </a>
        </div>
    </form>
</div>
{% endblock %}
