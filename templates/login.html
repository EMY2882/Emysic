<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión — Emysic</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/estilos.css') }}" rel="stylesheet">
    <style>
        .login-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0a0a;
            padding: 1rem;
        }
        .login-box { width: 100%; max-width: 420px; }

        .login-logo {
            display: inline-flex;
            align-items: center;
            gap: .6rem;
            font-size: 1.6rem;
            font-weight: 700;
            color: #f0f0f0;
            text-decoration: none;
            margin-bottom: .4rem;
        }
        .login-logo .play-btn {
            background: #FF0000;
            border-radius: 8px;
            width: 38px; height: 38px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1rem; color: #fff;
        }
        .login-card {
            background: #1a1a1a;
            border: 1px solid #2e2e2e;
            border-radius: 16px;
            padding: 2rem;
        }
        .login-footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: .72rem;
            color: #555;
        }
    </style>
</head>
<body>
<div class="login-wrapper">
    <div class="login-box">

        <!-- Logo -->
        <div class="text-center mb-4">
            <a href="#" class="login-logo">
                <span class="play-btn">▶</span>
                Emysic
            </a>
            <div style="font-size:.82rem;color:#888;margin-top:.3rem;">
                Panel de Administración
            </div>
        </div>

        <!-- Card -->
        <div class="login-card">
            <h5 class="mb-4" style="font-weight:700;color:#f0f0f0;">Iniciar sesión</h5>

            <!-- Aviso de sesión expirada -->
            {% if expirado %}
            <div class="alert-em mb-3">
                <i class="bi bi-exclamation-circle me-2"></i>
                Tu sesión expiró. Vuelve a iniciar sesión.
            </div>
            {% endif %}

            <!-- Error de credenciales -->
            {% if error %}
            <div class="alert-em mb-3">
                <i class="bi bi-x-circle me-2"></i> {{ error }}
            </div>
            {% endif %}

            <!-- Formulario -->
            <form method="POST" action="{{ url_for('login') }}">
                <div class="mb-3">
                    <label class="form-label">
                        <i class="bi bi-person me-1"></i> Usuario
                    </label>
                    <input type="text" name="username" class="form-control"
                           placeholder="admin" required autofocus>
                </div>
                <div class="mb-4">
                    <label class="form-label">
                        <i class="bi bi-lock me-1"></i> Contraseña
                    </label>
                    <div class="position-relative">
                        <input type="password" name="password" id="password"
                               class="form-control" placeholder="••••••••" required>
                        <button type="button"
                                onclick="togglePw('password','toggle-pw')"
                                style="position:absolute;right:10px;top:50%;transform:translateY(-50%);
                                       background:none;border:none;color:#888;cursor:pointer;padding:0;">
                            <i class="bi bi-eye" id="toggle-pw"></i>
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn btn-danger w-100"
                        style="border-radius:8px;padding:.65rem;font-size:.95rem;font-weight:600;">
                    <i class="bi bi-play-fill me-1"></i> Entrar
                </button>
            </form>

            <div class="text-center mt-4" style="font-size:.76rem;color:#555;">
                Credenciales por defecto:
                <code style="color:#FF0000;">EmyUPP/ Admin</code>
            </div>
        </div>

        <div class="login-footer">
            Emysic &copy; 2026 — MC3
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', filename='js/funciones.js') }}"></script>
</body>
</html>
